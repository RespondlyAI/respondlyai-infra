apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: respondlyai-ingress
  namespace: respondlyai
  annotations:
    # This tells Nginx to process this rule
    kubernetes.io/ingress.class: nginx
    # If a user hits /api/auth, we strip that prefix before sending it to Spring Boot
    nginx.ingress.kubernetes.io/rewrite-target: /
spec:
  rules:
    - http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: auth-service
                port:
                  number: 8080
