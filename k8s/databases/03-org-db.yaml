# 1. The Hard Drive Space
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: org-db-pvc
  namespace: respondlyai
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 2Gi

---
# 2. The Internal DNS Name
apiVersion: v1
kind: Service
metadata:
  name: org-db-service
  namespace: respondlyai
spec:
  selector:
    app: org-db
  ports:
    - protocol: TCP
      port: 5432
      targetPort: 5432

---
# 3. The PostgreSQL Container
apiVersion: apps/v1
kind: Deployment
metadata:
  name: org-db
  namespace: respondlyai
spec:
  replicas: 1
  selector:
    matchLabels:
      app: org-db
  template:
    metadata:
      labels:
        app: org-db
    spec:
      containers:
        - name: postgres
          image: postgres:15-alpine
          ports:
            - containerPort: 5432
          env:
            - name: POSTGRES_DB
              value: "org_db"
            - name: POSTGRES_USER
              value: "postgres"
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: respondlyai-secrets
                  key: DB_PASSWORD
          volumeMounts:
            - mountPath: /var/lib/postgresql/data
              name: org-db-storage
      volumes:
        - name: org-db-storage
          persistentVolumeClaim:
            claimName: org-db-pvc
